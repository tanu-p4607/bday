<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Birthday Surprise 🎂</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff9ecf,#ffd6e8);
overflow:hidden;
}

.container{
background:white;
padding:40px;
border-radius:25px;
text-align:center;
max-width:500px;
width:90%;
box-shadow:0 15px 40px rgba(0,0,0,.2);
}

h1{
color:#ff4081;
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
font-size:18px;
border-radius:10px;
border:2px solid #ff9ecf;
margin-top:15px;
outline:none;
}

button{
margin-top:20px;
padding:15px 30px;
font-size:18px;
background:#ff4081;
color:white;
border:none;
border-radius:30px;
cursor:pointer;
}

button:hover{
background:#e91e63;
}

#error{
color:red;
margin-top:15px;
}

#surprise{
display:none;
}

</style>

</head>
<body>

<div class="container">

<div id="login">

<h1>🎁 Birthday Surprise 🎁</h1>

<p>This surprise is only for one special person.</p>

<input
type="password"
id="password"
placeholder="Enter Secret Code">

<button onclick="checkPassword()">Unlock ❤️</button>

<p id="error"></p>

</div>

<div id="surprise">

<h1>🎉 HAPPY BIRTHDAY! 🎉</h1>

<h2>❤️ Dear Bestie ❤️</h2>

<p style="margin-top:20px;font-size:20px;line-height:1.8;color:#555;">

Wishing you endless happiness, laughter and success.<br><br>

Thank you for always being there for me.<br><br>

May all your dreams come true.<br><br>

Have the most amazing birthday ever! 🎂✨

</p>

</div>

</div>

<script>

function checkPassword(){

let pass=document.getElementById("password").value;

if(pass==="piggiesis"){

document.getElementById("login").style.display="none";
document.getElementById("surprise").style.display="block";

}else{

document.getElementById("error").innerHTML="❌ Wrong Secret Code";

}

}

</script>

</body>
</html>
