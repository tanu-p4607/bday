<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday ❤️</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, Helvetica, sans-serif;
        }

        body{
            background:linear-gradient(135deg,#ff9ecf,#ffd6e8);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            overflow:hidden;
        }

        .card{
            background:white;
            width:90%;
            max-width:500px;
            padding:40px;
            border-radius:25px;
            text-align:center;
            box-shadow:0 15px 40px rgba(0,0,0,.2);
        }

        h1{
            color:#ff4081;
            font-size:40px;
        }

        p{
            margin-top:20px;
            font-size:20px;
            color:#555;
            line-height:1.6;
        }

        button{
            margin-top:30px;
            padding:15px 30px;
            border:none;
            border-radius:30px;
            background:#ff4081;
            color:white;
            font-size:18px;
            cursor:pointer;
        }

        button:hover{
            background:#e91e63;
        }

        #message{
            display:none;
        }
    </style>
</head>

<body>

<div class="card">

<div id="start">

<h1>🎁</h1>

<h2>A Special Surprise</h2>

<p>Click below to open your birthday gift.</p>

<button onclick="showWish()">Open Gift 🎂</button>

</div>

<div id="message">

<h1>🎉 Happy Birthday dii 🎉</h1>

<p>

Dear sister ❤️<br><br>

Wishing you endless happiness, laughter and success.<br><br>

Thank you for always being by my side. I wish you are always worried about me<br><br>

May you be dogie sis in every lifetime! ✨<br><br>

Lots of love ❤️

</p>

</div>

</div>

<script>
function showWish(){
document.getElementById("start").style.display="none";
document.getElementById("message").style.display="block";
}
</script>

</body>
</html>
